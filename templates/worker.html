<!DOCTYPE html>
<html>
<head>
    <title>Worker Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="mb-4">👨‍🔧 Worker Profile</h2>

    <div class="card p-4 shadow">
        <h3 class="text-primary">{{ worker[1] }}</h3>

        <p><b>Work:</b> {{ worker[2] }}</p>
        <p><b>Phone:</b> {{ worker[3] }}</p>
        <p><b>Location:</b> {{ worker[4] }}</p>

        <a href="/book/{{ worker[0] }}" class="btn btn-success mt-3">
            Book Now
        </a>
    </div>

    <!-- Add Review -->
    <h4 class="mt-4">⭐ Add Review</h4>

    <form method="POST" action="/review/{{ worker[0] }}">
        <select name="rating" class="form-control mb-2">
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
        </select>

        <textarea name="review" class="form-control mb-2" placeholder="Write review"></textarea>

        <button class="btn btn-primary">Submit</button>
    </form>

    <!-- Show Reviews -->
    <h4 class="mt-4">📝 Reviews</h4>

    {% for r in reviews %}
        <div class="card p-2 mb-2">
            ⭐ {{ r[2] }} <br>
            {{ r[3] }}
        </div>
    {% endfor %}

    <a href="/" class="btn btn-secondary mt-3">⬅ Back</a>

</body>
</html>
