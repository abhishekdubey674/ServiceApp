<!DOCTYPE html>
<html>
<head>
    <title>Register Worker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Heading -->
    <h2 class="text-center mb-4">👨‍🔧 Register as Worker</h2>

    <!-- Form Card -->
    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">

        <form method="POST">

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <!-- Work -->
            <div class="mb-3">
                <label class="form-label">Work Type</label>
                <select name="work" class="form-control" required>
                    <option value="">Select Work</option>
                    <option>Plumber</option>
                    <option>Electrician</option>
                    <option>Mechanic</option>
                </select>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>
            </div>

            <!-- Location -->
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" placeholder="Enter your city" required>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-primary w-100">Register</button>

        </form>

        <!-- Back -->
        <div class="text-center mt-3">
            <a href="/" class="btn btn-link">← Back to Home</a>
        </div>

    </div>

</div>

</body>
</html>
